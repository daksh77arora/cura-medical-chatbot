services:
  api:
    build: 
      context: ..
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    env_file: ../.env
    depends_on: [redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    restart: unless-stopped

volumes:
  redis_data:
